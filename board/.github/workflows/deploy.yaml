name: DevSecOps CI-CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4


    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '11'


    - name: Give permission to mvnw
      run: chmod +x mvnw
      working-directory: board


    - name: Build Application
      run: ./mvnw clean package -DskipTests
      working-directory: board


    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}


    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2


    - name: Trivy Filesystem Scan
      uses: aquasecurity/trivy-action@0.20.0
      with:
        scan-type: fs
        scan-ref: .
        severity: HIGH,CRITICAL


    - name: Build Docker Image
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        IMAGE_TAG=$(date +%s)

        echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

        docker build -t $ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG .


    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@0.20.0
      with:
        scan-type: image
        image-ref: ${{ env.ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
        severity: HIGH,CRITICAL


    - name: Push Image to ECR
      run: |
        docker push $ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG


    - name: Install kubectl
      run: |
        curl -LO "https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/


    - name: Update kubeconfig for EKS
      run: |
        aws eks update-kubeconfig \
        --region ${{ secrets.AWS_REGION }} \
        --name ${{ secrets.EKS_CLUSTER_NAME }}


    - name: Apply Kubernetes manifests
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/deployment.yaml -n ${{ secrets.K8S_NAMESPACE }}
        kubectl apply -f k8s/service.yaml -n ${{ secrets.K8S_NAMESPACE }}


    - name: Update Deployment Image
      run: |
        kubectl set image deployment/train-ticket-deployment \
        train-ticket-container=$ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG \
        -n ${{ secrets.K8S_NAMESPACE }}

        kubectl rollout status deployment/train-ticket-deployment \
        -n ${{ secrets.K8S_NAMESPACE }} --timeout=200s
